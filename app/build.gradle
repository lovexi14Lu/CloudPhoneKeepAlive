plugins {
    id 'com.android.application'
}

android {
    namespace 'com.keepalive.cloudphone'
    compileSdk 34

    defaultConfig {
        applicationId "com.keepalive.cloudphone"
        minSdk 26
        targetSdk 34
        versionCode 100
        versionName "1.0.0"
    }

    buildTypes {
        release {
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    packaging {
        resources {
            excludes += '/META-INF/**'
        }
    }
}

dependencies {
    compileOnly 'de.robv.android.xposed:api:82'
}
